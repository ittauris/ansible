host_key_checking = False
forks             = 5
deprecation_warnings = False
 
# Automatické načítanie hesla k vaultu
vault_password_file = /srv/ansible/vault.yml

[winrm]
operation_timeout_sec  = 60
read_timeout_sec       = 70
