---
# Playbook: Doplnenie IP proxy do konfigurácie Zabbix agenta
# TC skupiny: 10.100.0.26 (proxy-tc)
# RS skupiny: 10.20.20.37 (proxy-rs)

- name: Doplnenie proxy-tc IP do Zabbix agenta - TC servery
  hosts: TC
  gather_facts: false

  vars:
    proxy_ip: "10.100.0.26"
    agent_conf: 'C:\Program Files\Zabbix Agent 2\zabbix_agent2.conf'

  tasks:
    - name: Nacitaj aktualny obsah konfiguracneho suboru
      ansible.windows.win_shell: |
        Get-Content "{{ agent_conf }}" | Select-String "^Server=" | Select-Object -ExpandProperty Line
      register: current_server_line

    - name: Zobraz aktualnu hodnotu Server=
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ current_server_line.stdout | trim }}"

    - name: Pridaj proxy IP ak este nie je v Server=
      ansible.windows.win_shell: |
        $conf = "{{ agent_conf }}"
        $content = Get-Content $conf -Raw
        $line = ($content -split "`n" | Select-String "^Server=").Line.Trim()
        $current = $line -replace "^Server=", ""
        $ips = $current -split "," | ForEach-Object { $_.Trim() }
        if ("{{ proxy_ip }}" -notin $ips) {
            $newLine = "Server=" + ($ips + "{{ proxy_ip }}" -join ",")
            $content = $content -replace [regex]::Escape($line), $newLine
            Set-Content $conf $content -NoNewline
            Write-Output "ZMENENE: $newLine"
        } else {
            Write-Output "UZ EXISTUJE: $line"
        }
      register: update_result

    - name: Zobraz vysledok zmeny
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ update_result.stdout | trim }}"

    - name: Restartuj Zabbix agenta ak bola zmena
      ansible.windows.win_service:
        name: "Zabbix Agent 2"
        state: restarted
      when: "'ZMENENE' in update_result.stdout"


