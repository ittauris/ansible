---
# ==============================================================
# PLAY 1: Domain Controllers (DCKE, DCRS, DCTC) - jeden po druhom
# ==============================================================
- name: "FAZA 1: Aktualizacia Domain Controllers"
  hosts: DC
  gather_facts: false
  serial: 1
  max_fail_percentage: 0
  vars:
    snapshot_name: "Ansible_Update_{{ now().strftime('%Y%m%d') }}"

  tasks:
    - name: "SNAPSHOT: Vytvorenie (VMware TC)"
      delegate_to: localhost
      community.vmware.vmware_guest_snapshot:
        hostname: "{{ vcenter_host }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_pass }}"
        datacenter: "Tauris_Cloud"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: present
        snapshot_name: "{{ snapshot_name }}"
      when: "'DCTC' in group_names"

    - name: "UPDATE: Instalacia Security & Critical Updates"
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        reboot: yes
        state: installed
      register: update_result

    - name: "SNAPSHOT: Odstranenie po uspesnom update (VMware TC)"
      delegate_to: localhost
      community.vmware.vmware_guest_snapshot:
        hostname: "{{ vcenter_host }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_pass }}"
        datacenter: "Tauris_Cloud"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: absent
        snapshot_name: "{{ snapshot_name }}"
      when:
        - "'DCTC' in group_names"
        - update_result is defined
        - not (update_result.failed | default(false)) | bool
        - update_result.rebooted | bool or update_result.installed_update_count | int == 0

# ==============================================================
# PLAY 2: Hyper-V hosty - po 2 (reboot HV = kratsi okno)
# ==============================================================
- name: "FAZA 2: Aktualizacia Hyper-V serverov"
  hosts: windows_hv
  gather_facts: false
  serial: 2
  max_fail_percentage: 0
  vars:
    snapshot_name: "Ansible_Update_{{ now().strftime('%Y%m%d') }}"

  tasks:
    - name: "UPDATE: Instalacia Security & Critical Updates"
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        reboot: yes
        state: installed
      register: update_result

# ==============================================================
# PLAY 3: Ostatne Windows servery - po 5
# ==============================================================
- name: "FAZA 3: Aktualizacia ostatnych Windows serverov"
  hosts: windows_members
  gather_facts: false
  serial: 5
  max_fail_percentage: 20
  vars:
    snapshot_name: "Ansible_Update_{{ now().strftime('%Y%m%d') }}"

  tasks:
    # --- Mapovanie Hyper-V hostitela ---
    - name: "Identifikacia Hyper-V hostitela"
      delegate_to: "{{ item }}"
      loop: "{{ (groups['HVKE'] | default([]) + groups['HVRS'] | default([])) | unique }}"
      ansible.windows.win_powershell:
        script: |
          if (Get-VM -Name "{{ inventory_hostname.split('.')[0] }}" -ErrorAction SilentlyContinue) {
            Write-Output "true"
          } else {
            Write-Output "false"
          }
      register: hv_search
      when: "'KE' in group_names or 'RS' in group_names"
      ignore_errors: yes

    - name: "Priradenie HV hostitela k VM"
      set_fact:
        my_hv_host: "{{ item.item }}"
      loop: "{{ hv_search.results | default([]) }}"
      when:
        - item.output is defined
        - item.output[0] | string | lower == 'true'
      no_log: true

    - name: "SNAPSHOT: Vytvorenie (Hyper-V)"
      delegate_to: "{{ my_hv_host }}"
      ansible.windows.win_powershell:
        script: |
          Checkpoint-VM -Name "{{ inventory_hostname.split('.')[0] }}" -SnapshotName "{{ snapshot_name }}"
      when: my_hv_host is defined

    - name: "SNAPSHOT: Vytvorenie (VMware TC)"
      delegate_to: localhost
      community.vmware.vmware_guest_snapshot:
        hostname: "{{ vcenter_host }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_pass }}"
        datacenter: "Tauris_Cloud"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: present
        snapshot_name: "{{ snapshot_name }}"
      when: "'TC' in group_names"

    - name: "UPDATE: Instalacia Security & Critical Updates"
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        reboot: yes
        state: installed
      register: update_result

    - name: "SNAPSHOT: Odstranenie po uspesnom update (Hyper-V)"
      delegate_to: "{{ my_hv_host }}"
      ansible.windows.win_powershell:
        script: |
          Remove-VMSnapshot -VMName "{{ inventory_hostname.split('.')[0] }}" -Name "{{ snapshot_name }}"
      when:
        - my_hv_host is defined
        - update_result is defined
        - not (update_result.failed | default(false)) | bool
        - update_result.rebooted | bool or update_result.installed_update_count | int == 0

    - name: "SNAPSHOT: Odstranenie po uspesnom update (VMware TC)"
      delegate_to: localhost
      community.vmware.vmware_guest_snapshot:
        hostname: "{{ vcenter_host }}"
        username: "{{ vcenter_user }}"
        password: "{{ vcenter_pass }}"
        datacenter: "Tauris_Cloud"
        name: "{{ inventory_hostname.split('.")[0] }}"
        state: absent
        snapshot_name: "{{ snapshot_name }}"
      when:
        - "'TC' in group_names"
        - update_result is defined
        - not (update_result.failed | default(false)) | bool
        - update_result.rebooted | bool or update_result.installed_update_count | int == 0
